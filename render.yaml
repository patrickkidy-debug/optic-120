# ============================================================
# OculoSaaS — Blueprint Render (backend API + base PostgreSQL)
# Le frontend est déployé séparément sur Vercel.
# Sur render.com : New > Blueprint > sélectionne ce repo.
# ============================================================
databases:
  - name: oculosaas-db
    databaseName: oculo
    plan: free # passe en "starter" pour la production
    region: frankfurt # région la plus proche de l'Afrique de l'Ouest

services:
  - type: web
    name: oculosaas-api
    runtime: node
    plan: free # passe en "starter" pour la production
    region: frankfurt
    rootDir: .
    # --include=dev : indispensable car NODE_ENV=production ferait sinon sauter
    # les outils de build (tsc, prisma, tsx) marqués en devDependencies.
    buildCommand: >-
      npm install --include=dev &&
      npm run build --workspace @oculo/shared-types &&
      npm run db:generate --workspace @oculo/api
    startCommand: >-
      npm run db:migrate:deploy --workspace @oculo/api &&
      npm run start --workspace @oculo/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Pas besoin de définir le port : Render fournit $PORT, que le serveur lit en priorité.
      - key: DATABASE_URL
        fromDatabase:
          name: oculosaas-db
          property: connectionString
      # --- À renseigner dans le dashboard Render ---
      - key: CORS_ORIGIN
        sync: false # = URL Vercel du frontend, ex. https://optic-120.vercel.app
      - key: COOKIE_DOMAIN
        value: "" # vide en cross-domaine : la cookie reste rattachée au domaine de l'API
      - key: COOKIE_SAMESITE
        value: none # obligatoire pour des cookies cross-site (frontend Vercel ↔ API Render)
      - key: COOKIE_SECURE
        value: "true" # requis quand SameSite=None
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: ENCRYPTION_KEY
        generateValue: true # Render génère une valeur ; le code en dérive une clé AES-256 (lib/crypto.ts)
      - key: MAIL_DRIVER
        value: console
      - key: MAIL_FROM
        value: OculoSaaS <no-reply@oculosaas.africa>
      - key: PLATFORM_ADMIN_EMAILS
        sync: false # ton email admin, ex. patrickkidy@gmail.com
