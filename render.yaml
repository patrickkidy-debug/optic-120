# ============================================================
# OculoSaaS — Blueprint Render (backend API + base PostgreSQL)
# Le frontend est déployé séparément sur Vercel.
# Sur render.com : New > Blueprint > sélectionne ce repo.
# ============================================================
databases:
  - name: oculosaas-db
    databaseName: oculo
    plan: free # passe en "starter" pour la production
    region: frankfurt # région la plus proche de l'Afrique de l'Ouest

services:
  - type: web
    name: oculosaas-api
    runtime: node
    plan: free # passe en "starter" pour la production
    region: frankfurt
    rootDir: .
    # --include=dev : indispensable car NODE_ENV=production ferait sinon sauter
    # les outils de build (tsc, prisma, tsx) marqués en devDependencies.
    buildCommand: >-
      npm install --include=dev &&
      npm run build --workspace @oculo/shared-types &&
      npm run db:generate --workspace @oculo/api
    # Au démarrage : applique les migrations, puis seed (idempotent) les rôles,
    # permissions et offres — indispensables pour l'inscription — puis lance l'API.
    startCommand: >-
      npm run db:migrate:deploy --workspace @oculo/api &&
      npm run db:seed --workspace @oculo/api &&
      npm run start --workspace @oculo/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Pas besoin de définir le port : Render fournit $PORT, que le serveur lit en priorité.
      - key: DATABASE_URL
        fromDatabase:
          name: oculosaas-db
          property: connectionString
      # --- À renseigner dans le dashboard Render ---
      - key: CORS_ORIGIN
        sync: false # URL(s) du frontend, séparées par des virgules si plusieurs.
        # ex. https://ton-site.netlify.app  ou  https://optic-120.vercel.app,https://ton-site.netlify.app
      - key: COOKIE_DOMAIN
        value: "" # vide en cross-domaine : la cookie reste rattachée au domaine de l'API
      - key: COOKIE_SAMESITE
        value: none # obligatoire pour des cookies cross-site (frontend Vercel ↔ API Render)
      - key: COOKIE_SECURE
        value: "true" # requis quand SameSite=None
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: ENCRYPTION_KEY
        generateValue: true # Render génère une valeur ; le code en dérive une clé AES-256 (lib/crypto.ts)
      # --- Envoi d'emails (confirmation, réinitialisation, notifications) ---
      # Passe MAIL_DRIVER à "smtp" et renseigne les identifiants ci-dessous pour
      # que les emails partent réellement (sinon mode console = rien n'est envoyé).
      - key: MAIL_DRIVER
        value: console # → "smtp" en production
      - key: MAIL_FROM
        value: OculoSaaS <no-reply@oculosaas.africa> # nom d'affichage ; l'adresse réelle est alignée sur SMTP_USER
      - key: SMTP_HOST
        sync: false # ex. smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false # ex. ton adresse Gmail
      - key: SMTP_PASSWORD
        sync: false # mot de passe d'application (Gmail App Password), pas le mot de passe du compte
      - key: PLATFORM_ADMIN_EMAILS
        sync: false # ton email admin, ex. patrickkidy@gmail.com
      # --- Paiement des abonnements (Moneroo) ---
      # OBLIGATOIRE en production : sans clé réelle, l'API refuse d'activer un
      # abonnement (fail-closed) — aucun accès gratuit possible.
      - key: MONEROO_SECRET_KEY
        sync: false # clé secrète Moneroo (dashboard Moneroo > API)
      - key: MONEROO_WEBHOOK_SECRET
        sync: false # secret du webhook Moneroo (vérification des notifications)
      # --- Publicité Facebook : API de Conversion (CAPI) ---
      # Le pixel a déjà une valeur par défaut ; il suffit de fournir le jeton
      # d'accès (Events Manager > Paramètres > API de conversion) pour activer
      # l'envoi serveur, dédupliqué avec le Pixel navigateur via event_id.
      - key: META_PIXEL_ID
        value: "1247725803989922"
      - key: META_CAPI_ACCESS_TOKEN
        sync: false # jeton d'accès CAPI (Events Manager > API de conversion)
      - key: META_CAPI_TEST_EVENT_CODE
        sync: false # facultatif : code de test pour "Événements de test"
