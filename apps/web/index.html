    <!-- PWA : installation depuis le navigateur -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-title" content="OculoSaaS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Capture l'invite d'installation PWA TRÈS TÔT : Chrome peut déclencher
         « beforeinstallprompt » avant le montage de React, sinon l'événement est
         perdu et le bouton « Installer » n'apparaît jamais. -->
    <script>
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__oculoInstallPrompt = e;
        window.dispatchEvent(new Event('oculo-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__oculoInstallPrompt = null;
      });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Chargement non bloquant : la feuille de style Google Fonts retardait
         le premier rendu (le navigateur doit la télécharger avant de pouvoir
         peindre la page). On la charge en arrière-plan (media="print" ignoré
         au rendu) puis on l'active une fois prête ; repli <noscript>. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>

        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
