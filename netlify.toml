# ============================================================
# OculoSaaS — Déploiement du frontend (apps/web) sur Netlify.
# L'API + la base PostgreSQL restent sur Render.
# Sur netlify.com : Add new site > Import from Git > sélectionne ce repo.
# ============================================================

[build]
  # Base = racine du monorepo pour que les workspaces npm se résolvent.
  base = "."
  # On build d'abord les types partagés, puis le front.
  command = "npm install && npm run build --workspace @oculo/shared-types && npm run build --workspace @oculo/web"
  # Dossier statique généré par Vite.
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"
  # Évite que NODE_ENV=production fasse sauter l'installation des devDeps de build.
  NPM_FLAGS = "--include=dev"
  # URL de l'API (domaine personnalisé pointant vers Render). Vite la fige dans
  # le bundle au build. Publique par nature. Surchargeable depuis le dashboard.
  VITE_API_URL = "https://api.oculosaas.com"

# SPA : toutes les routes inconnues renvoient index.html (React Router gère ensuite).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sécurité renforcée sur les en-têtes HTTP.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS pendant 2 ans (préchargement navigateur inclus).
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Désactive les API sensibles non utilisées (display-capture laissé actif
    # pour l'enregistrement des vidéos de présentation).
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    # Anti-clickjacking moderne (en plus de X-Frame-Options).
    Content-Security-Policy = "frame-ancestors 'self'; base-uri 'self'; object-src 'none'"
    # Isole le contexte de navigation tout en autorisant les popups (checkout).
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
